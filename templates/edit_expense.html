{% extends "base.html" %}

{% block page_title %}Edit Expense{% endblock %}

{% block content %}
<div class="form-container">
    <form method="POST">
        <div class="form-group">
            <label for="amount">Amount (₹)</label>
            <input type="number" step="0.01" name="amount" id="amount" class="form-input" value="{{ expense.amount }}" required>
        </div>
        
        <div class="form-group">
            <label for="category">Category</label>
            <select name="category" id="category" class="form-input" required>
                {% for category in categories %}
                <option value="{{ category }}" {{ 'selected' if expense.category == category }}>{{ category }}</option>
                {% endfor %}
            </select>
        </div>
        
        <div class="form-group">
            <label for="date">Date</label>
            <input type="date" name="date" id="date" class="form-input" value="{{ expense.date.strftime('%Y-%m-%d') }}" required>
        </div>
        
        <div class="form-group">
            <label for="note">Note</label>
            <input type="text" name="note" id="note" class="form-input" value="{{ expense.note or '' }}" placeholder="e.g. Dinner with friends">
        </div>
        
        <div style="display: flex; gap: 1rem; margin-top: 2rem;">
            <button type="submit" class="btn btn-primary" style="flex: 1;">
                <i class="fas fa-check"></i> Update Expense
            </button>
            <a href="{{ url_for('expenses') }}" class="btn" style="background: #e2e8f0; color: #475569; flex: 1; text-align: center;">
                Cancel
            </a>
        </div>
    </form>
</div>
{% endblock %}
