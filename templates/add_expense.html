{% extends "base.html" %}

{% block page_title %}Add New Expense{% endblock %}

{% block content %}
<div class="form-container">
    <form method="POST">
        <div class="form-group">
            <label for="amount">Amount (₹)</label>
            <input type="number" step="0.01" name="amount" id="amount" class="form-input" placeholder="0.00" required>
        </div>
        
        <div class="form-group">
            <label for="category">Category</label>
            <select name="category" id="category" class="form-input" required>
                <option value="" disabled selected>Select a category</option>
                {% for category in categories %}
                <option value="{{ category }}">{{ category }}</option>
                {% endfor %}
            </select>
        </div>
        
        <div class="form-group">
            <label for="date">Date</label>
            <input type="date" name="date" id="date" class="form-input" value="{{ today }}" required>
        </div>
        
        <div class="form-group">
            <label for="note">Note (Optional)</label>
            <input type="text" name="note" id="note" class="form-input" placeholder="e.g. Dinner with friends">
        </div>
        
        <div class="form-group" style="background: #f8fafc; padding: 1rem; border-radius: 0.5rem; border: 1px dashed var(--border-color);">
            <div style="display: flex; align-items: center; gap: 0.75rem; margin-bottom: 0.5rem;">
                <input type="checkbox" id="is_recurring" name="is_recurring" onchange="toggleFrequency()">
                <label for="is_recurring" style="margin-bottom: 0; cursor: pointer;">Set as Recurring Expense</label>
            </div>
            <div id="frequency_group" style="display: none;">
                <label for="frequency" style="font-size: 0.75rem; color: var(--text-muted); margin-bottom: 0.25rem;">Repeat Every:</label>
                <select name="frequency" id="frequency" class="form-input">
                    <option value="Daily">Day</option>
                    <option value="Weekly">Week</option>
                    <option value="Monthly" selected>Month</option>
                </select>
                <p style="font-size: 0.7rem; color: var(--text-muted); margin-top: 0.5rem;">
                    * Automated entries will be created starting from the date above.
                </p>
            </div>
        </div>

        <script>
            function toggleFrequency() {
                const checkbox = document.getElementById('is_recurring');
                const frequencyGroup = document.getElementById('frequency_group');
                frequencyGroup.style.display = checkbox.checked ? 'block' : 'none';
            }
        </script>
        
        <div style="display: flex; gap: 1rem; margin-top: 2rem;">
            <button type="submit" class="btn btn-primary" style="flex: 1;">
                <i class="fas fa-save"></i> Save Expense
            </button>
            <a href="{{ url_for('dashboard') }}" class="btn" style="background: #e2e8f0; color: #475569; flex: 1; text-align: center;">
                Cancel
            </a>
        </div>
    </form>
</div>
{% endblock %}
