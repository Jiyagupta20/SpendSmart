<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SpendSmart</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,400..900;1,400..900&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="{{ url_for('static', filename='style.css') }}">
</head>
<body class="splash-body">
    <div class="splash-container">
        <div class="brand splash-brand">
            <!-- Cloud/Brain Icon (Left) -->
            <svg width="80" height="80" viewBox="0 0 512 512" xmlns="http://www.w3.org/2000/svg">
                <path d="M240 80c-44.2 0-80 35.8-80 80 0 16.4 4.9 31.7 13.3 44.4-18.4 12.6-30.5 33.6-30.5 57.6 0 24 12.1 45 30.5 57.6-8.4 12.7-13.3 28-13.3 44.4 0 44.2 35.8 80 80 80h10V80h-10z" fill="white"/>
            </svg>
            
            <span class="splash-title">Spendsmart</span>
            
            <!-- Banknote/Card Icon (Right) -->
            <svg width="80" height="80" viewBox="0 0 512 512" xmlns="http://www.w3.org/2000/svg">
                <rect x="0" y="110" width="160" height="292" rx="20" fill="white" opacity="0.9"/>
                <circle cx="80" cy="256" r="35" fill="black" opacity="0.2"/>
                <circle cx="80" cy="160" r="10" fill="black" opacity="0.2"/>
                <circle cx="80" cy="352" r="10" fill="black" opacity="0.2"/>
                <path d="M200 110v292c40 0 70-50 70-146s-30-146-70-146" fill="white" opacity="0.8"/>
            </svg>
        </div>
    </div>

    <script>
        // Redirect after 1.5 seconds with a smooth fade out
        setTimeout(() => {
            const container = document.querySelector('.splash-container');
            container.style.opacity = '0';
            container.style.transform = 'scale(1.05)';
            
            setTimeout(() => {
                window.location.href = "{{ url_for('login') }}";
            }, 600);
        }, 1500);
    </script>
</body>
</html>
